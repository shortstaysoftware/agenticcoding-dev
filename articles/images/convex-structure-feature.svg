<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="teal-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6"/>
      <stop offset="100%" style="stop-color:#0d9488"/>
    </linearGradient>
    <linearGradient id="blue-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg-gradient)"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="#334155" opacity="0.5"/>
  </pattern>
  <rect width="800" height="400" fill="url(#grid)"/>

  <!-- Main folder structure visualization -->
  <g transform="translate(80, 60)">
    <!-- convex/ root -->
    <rect x="0" y="0" width="120" height="36" rx="6" fill="#334155" stroke="#475569" stroke-width="1"/>
    <text x="16" y="23" font-family="JetBrains Mono, monospace" font-size="14" fill="#3b82f6">convex/</text>

    <!-- Connecting lines -->
    <line x1="60" y1="36" x2="60" y2="70" stroke="#475569" stroke-width="2"/>
    <line x1="60" y1="70" x2="60" y2="280" stroke="#475569" stroke-width="2"/>

    <!-- core/ domain -->
    <g transform="translate(80, 60)">
      <line x1="-20" y1="18" x2="0" y2="18" stroke="#475569" stroke-width="2"/>
      <rect x="0" y="0" width="100" height="36" rx="6" fill="url(#teal-gradient)" opacity="0.2" stroke="#14b8a6" stroke-width="1"/>
      <text x="16" y="23" font-family="JetBrains Mono, monospace" font-size="13" fill="#14b8a6">core/</text>

      <!-- Submodules -->
      <g transform="translate(30, 50)">
        <line x1="-10" y1="12" x2="0" y2="12" stroke="#475569" stroke-width="1"/>
        <rect x="0" y="0" width="90" height="24" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
        <text x="10" y="16" font-family="JetBrains Mono, monospace" font-size="11" fill="#94a3b8">rentals/</text>
      </g>
      <g transform="translate(30, 80)">
        <line x1="-10" y1="12" x2="0" y2="12" stroke="#475569" stroke-width="1"/>
        <rect x="0" y="0" width="120" height="24" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
        <text x="10" y="16" font-family="JetBrains Mono, monospace" font-size="11" fill="#94a3b8">reservations/</text>
      </g>
    </g>

    <!-- revenue/ domain -->
    <g transform="translate(80, 170)">
      <line x1="-20" y1="18" x2="0" y2="18" stroke="#475569" stroke-width="2"/>
      <rect x="0" y="0" width="110" height="36" rx="6" fill="url(#blue-gradient)" opacity="0.2" stroke="#3b82f6" stroke-width="1"/>
      <text x="16" y="23" font-family="JetBrains Mono, monospace" font-size="13" fill="#3b82f6">revenue/</text>

      <!-- Submodules -->
      <g transform="translate(30, 50)">
        <line x1="-10" y1="12" x2="0" y2="12" stroke="#475569" stroke-width="1"/>
        <rect x="0" y="0" width="80" height="24" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
        <text x="10" y="16" font-family="JetBrains Mono, monospace" font-size="11" fill="#94a3b8">rates/</text>
      </g>
      <g transform="translate(30, 80)">
        <line x1="-10" y1="12" x2="0" y2="12" stroke="#475569" stroke-width="1"/>
        <rect x="0" y="0" width="90" height="24" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
        <text x="10" y="16" font-family="JetBrains Mono, monospace" font-size="11" fill="#94a3b8">reports/</text>
      </g>
    </g>
  </g>

  <!-- Module detail panel -->
  <g transform="translate(400, 80)">
    <rect x="0" y="0" width="320" height="240" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>

    <!-- Header -->
    <rect x="0" y="0" width="320" height="40" rx="12" fill="#0f172a"/>
    <rect x="0" y="28" width="320" height="12" fill="#0f172a"/>
    <circle cx="20" cy="20" r="5" fill="#ef4444"/>
    <circle cx="40" cy="20" r="5" fill="#eab308"/>
    <circle cx="60" cy="20" r="5" fill="#22c55e"/>
    <text x="160" y="25" font-family="JetBrains Mono, monospace" font-size="11" fill="#64748b" text-anchor="middle">module structure</text>

    <!-- File list -->
    <g transform="translate(20, 60)">
      <text x="0" y="0" font-family="JetBrains Mono, monospace" font-size="13" fill="#3b82f6">rentals/</text>

      <text x="20" y="30" font-family="JetBrains Mono, monospace" font-size="12" fill="#94a3b8">api.ts</text>
      <text x="120" y="30" font-family="JetBrains Mono, monospace" font-size="10" fill="#64748b"># public interface</text>

      <text x="20" y="55" font-family="JetBrains Mono, monospace" font-size="12" fill="#94a3b8">functions.ts</text>
      <text x="140" y="55" font-family="JetBrains Mono, monospace" font-size="10" fill="#64748b"># implementations</text>

      <text x="20" y="80" font-family="JetBrains Mono, monospace" font-size="12" fill="#94a3b8">schema.ts</text>
      <text x="130" y="80" font-family="JetBrains Mono, monospace" font-size="10" fill="#64748b"># tables, indexes</text>

      <text x="20" y="110" font-family="JetBrains Mono, monospace" font-size="12" fill="#a855f7">_logic/</text>
      <text x="90" y="110" font-family="JetBrains Mono, monospace" font-size="10" fill="#64748b"># pure functions</text>

      <text x="40" y="135" font-family="JetBrains Mono, monospace" font-size="11" fill="#64748b">calculations.ts</text>
      <text x="40" y="155" font-family="JetBrains Mono, monospace" font-size="11" fill="#64748b">__tests__/</text>
    </g>
  </g>

  <!-- Decorative elements -->
  <circle cx="720" cy="350" r="80" fill="#14b8a6" opacity="0.05"/>
  <circle cx="50" cy="350" r="60" fill="#3b82f6" opacity="0.05"/>
</svg>
